
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAGON SHOW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            height: 100vh;
            color: #fff;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: #0a1628 url("dragon_bg.png") center center / cover no-repeat fixed;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .top-header {
            flex-shrink: 0;
            position: relative;
        }

        .top-bar {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 24px 8px;
            background:
                linear-gradient(180deg,
                    rgba(0, 110, 130, 0.55) 0%,
                    rgba(0, 65, 85, 0.72) 45%,
                    rgba(8, 35, 52, 0.88) 100%);
            box-shadow:
                inset 0 1px 0 rgba(120, 240, 255, 0.35),
                inset 0 -4px 14px rgba(0, 180, 210, 0.1),
                0 2px 12px rgba(0, 0, 0, 0.35);
        }

        .top-glow-down {
            position: relative;
            height: 22px;
            pointer-events: none;
            background: linear-gradient(180deg,
                rgba(120, 248, 255, 0.45) 0%,
                rgba(0, 229, 255, 0.2) 22%,
                rgba(0, 200, 230, 0.07) 55%,
                transparent 100%);
        }

        .top-glow-down::before {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            height: 2px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(125, 244, 255, 0.4) 8%,
                #7df4ff 22%,
                #00e5ff 50%,
                #7df4ff 78%,
                rgba(125, 244, 255, 0.4) 92%,
                transparent 100%);
            box-shadow:
                0 0 8px rgba(125, 244, 255, 1),
                0 0 16px rgba(0, 229, 255, 0.75),
                0 0 28px rgba(0, 229, 255, 0.35),
                0 2px 10px rgba(0, 229, 255, 0.25);
        }

        .brand {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #fff;
        }

        .main-scroll {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .scroll-body {
            display: flex;
            flex-direction: column;
            min-height: 100%;
            box-sizing: border-box;
            padding: 4px 0 0;
        }

        .columns {
            display: flex;
            gap: 0;
            min-height: min-content;
            align-items: stretch;
            padding: 0 16px;
        }

        .section {
            flex: 1;
            min-width: 0;
            padding: 12px var(--section-pad-x) 20px;
        }

        .section-divider {
            display: none;
        }

        .section-head {
            display: none;
        }

        .section-title {
            display: inline-block;
            margin: 0;
            padding: 4px 42px 6px;
            text-align: center;
            font-family: "Orbitron", "Arial Black", sans-serif;
            font-size: var(--section-title-size);
            font-weight: 800;
            color: #fff;
            letter-spacing: 1.5px;
            text-transform: none;
            line-height: 1.2;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.45);
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(0, 55, 120, 0.4) 5%,
                rgba(0, 123, 255, 0.78) 22%,
                rgba(0, 123, 255, 0.78) 78%,
                rgba(0, 55, 120, 0.4) 95%,
                transparent 100%);
        }

        :root {
            --focus-green: #3DDC84;
            --focus-green-glow: rgba(61, 220, 132, 0.5);
            --btn-cyan: #4DB8D9;
            --btn-cyan-dark: #2E9BB8;
            --btn-cyan-deep: #1A7A96;
            --card-cols: 2;
            --card-gap: 14px;
            --box-pad-y: 12px;
            --box-pad-x: 10px;
            --card-title-size: 14px;
            --btn-size: 12px;
            --btn-pad-y: 9px;
            --section-title-size: 20px;
            --section-pad-x: 14px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(var(--card-cols), minmax(0, 1fr));
            gap: var(--card-gap);
        }

        .box {
            position: relative;
            overflow: hidden;
            background-color: rgba(18, 28, 42, 0.92);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 2px solid rgba(255, 255, 255, 0.12);
            border-radius: clamp(12px, 1.5vw, 18px);
            padding: var(--box-pad-y) var(--box-pad-x) calc(var(--box-pad-y) + 2px);
            text-align: center;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .box::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(180deg,
                rgba(6, 14, 26, 0.35) 0%,
                rgba(6, 14, 26, 0.82) 55%,
                rgba(6, 14, 26, 0.92) 100%);
            pointer-events: none;
            z-index: 0;
        }

        .box > * {
            position: relative;
            z-index: 1;
        }

        .section .box {
            background-image: url("https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=640&q=80");
        }

        .box:focus,
        .box.box-focused {
            border-color: var(--focus-green);
            transform: scale(1.03);
            outline: none;
            box-shadow: 0 0 18px var(--focus-green-glow);
        }

        .box.box-inside {
            border-color: var(--focus-green);
            transform: scale(1.04);
            box-shadow:
                0 0 0 3px rgba(61, 220, 132, 0.55),
                0 0 24px var(--focus-green-glow);
        }

        .box.box-inside .title-wrapper {
            border-bottom-color: rgba(61, 220, 132, 0.45);
        }

        .box.box-inside .title-wrapper h2 {
            color: var(--focus-green);
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(0, 80, 40, 0.42) 2%,
                rgba(0, 120, 60, 0.78) 14%,
                rgba(0, 120, 60, 0.78) 86%,
                rgba(0, 80, 40, 0.42) 98%,
                transparent 100%);
        }

        .title-wrapper {
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 180, 255, 0.25);
        }

        .title-wrapper h2 {
            display: block;
            width: 100%;
            margin: 0;
            padding: 6px 8px 7px;
            font-size: var(--card-title-size);
            font-weight: 700;
            color: #4db8ff;
            line-height: 1.3;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.55);
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(0, 55, 120, 0.42) 2%,
                rgba(0, 95, 115, 0.78) 14%,
                rgba(0, 95, 115, 0.78) 86%,
                rgba(0, 55, 120, 0.42) 98%,
                transparent 100%);
        }

        .btn-group {
            padding: 0 4px;
            display: flex;
            flex-wrap: wrap;
            gap: 0 6px;
        }

        .btn {
            background: var(--btn-cyan);
            color: #fff;
            border: none;
            padding: var(--btn-pad-y) 8px;
            border-radius: 12px;
            font-size: var(--btn-size);
            cursor: pointer;
            margin: 0 0 8px;
            width: 100%;
            font-weight: 700;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-clean {
            background: #3a3f47;
            color: #e8e8e8;
            font-size: calc(var(--btn-size) - 1px);
            margin-bottom: 0;
        }

        .btn:focus,
        .btn.btn-nav-focus,
        .btn:focus-visible {
            background: var(--btn-cyan-dark);
            outline: none;
            border-radius: 12px;
            box-shadow: 0 0 0 3px #7df4ff, 0 0 14px rgba(77, 184, 217, 0.6);
        }

        .btn-clean:focus { background: #555b65; }

        .btn-storage {
            display: none;
            background: var(--btn-cyan-deep);
            color: #fff;
            width: calc(50% - 3px);
            margin-bottom: 8px;
        }

        .btn-storage.external { background: #1565C0; }

        .box.details-open:not(.storage-visible) .btn-download { display: none; }

        .box.storage-visible .btn-details { display: none; }

        .box.storage-visible .btn-storage { display: inline-block; }

        .box.storage-visible .btn-download { width: 100%; margin-bottom: 6px; }

        .box.box-downloading .btn-details,
        .box.box-downloading .btn-download,
        .box.box-downloading .btn-storage { display: none !important; }

        .box.box-downloading .progress-container { display: block !important; }

        .details-panel {
            display: none;
            margin: 0 4px 10px;
            padding: 8px 10px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.45);
            font-size: calc(var(--btn-size) - 1px);
            line-height: 1.5;
            text-align: right;
        }

        .box.details-open .details-panel { display: block; }

        .status-msg {
            display: none;
            margin-top: 8px;
            font-size: 11px;
            color: #7df4ff;
        }

        .box.done .status-msg,
        .box.error .status-msg { display: block; }

        .box.error .status-msg { color: #ff6b6b; }

        .btn-install.is-ready {
            background: #1a3d1a;
            color: #39ff14;
        }

        .btn-install.is-ready:focus {
            background: #245a24;
            outline: none;
            box-shadow: 0 0 0 2px #39ff14;
        }

        .btn-install.is-not-ready {
            background: #3a3f47;
            color: #aaa;
        }

        .box-ready-install .btn-cancel {
            display: none !important;
        }

        .box-ready-install .btn-dl {
            width: 100%;
        }

        .btn-cancel {
            display: none;
            background: #8b2e2e;
            color: #fff;
            width: calc(50% - 3px);
            margin-bottom: 8px;
        }

        .btn-dl { width: 100%; }

        .box-downloading .btn-dl {
            width: calc(50% - 3px);
        }

        .box-downloading .btn-cancel {
            display: inline-block;
        }

        .btn-cancel:focus { background: #a83232; }

        .progress-container {
            width: 100%;
            background: #333;
            height: 18px;
            border-radius: 10px;
            margin: 12px auto 0;
            display: none;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--btn-cyan-deep), var(--btn-cyan));
            transition: width 0.2s ease;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 11px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
            z-index: 2;
        }

        .footer {
            flex-shrink: 0;
            margin-top: auto;
            text-align: center;
            padding: 40px 12px max(28px, env(safe-area-inset-bottom, 28px));
            color: #888;
            font-size: 12px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* Ã˜ÂªÃ™â€žÃ™ÂÃ˜Â§Ã˜Â²: Ã˜Â´Ã˜Â¨Ã™Æ’Ã˜Â© Ã™Æ’Ã™â€¦Ã˜Â§ Ã™Æ’Ã˜Â§Ã™â€ Ã˜Âª Ã¢â‚¬â€ Ã™â€žÃ˜Â§ Ã˜ÂªÃ˜ÂªÃ˜Â£Ã˜Â«Ã˜Â± Ã˜Â¨Ã˜Â¥Ã˜Â¹Ã˜Â¯Ã˜Â§Ã˜Â¯Ã˜Â§Ã˜Âª Ã˜Â§Ã™â€žÃ™â€¦Ã™Ë†Ã˜Â¨Ã˜Â§Ã™Å Ã™â€ž */
        @media (min-width: 901px) {
            body {
                height: 100vh;
            }
            .cards-grid {
                display: grid;
                grid-template-columns: repeat(var(--card-cols), minmax(0, 1fr));
                overflow: visible;
                flex-direction: unset;
                flex-wrap: unset;
                scroll-snap-type: none;
                padding: 0;
            }
            .box {
                flex: unset;
                min-width: 0;
                max-width: none;
                scroll-snap-align: unset;
            }
            .box:focus,
            .box:focus-within {
                transform: none;
            }
            .section-head {
                transition: opacity 0.25s ease, max-height 0.25s ease, margin-bottom 0.25s ease;
                max-height: 72px;
                overflow: hidden;
            }
            .section-head.tv-hidden {
                opacity: 0;
                max-height: 0;
                margin-bottom: 0 !important;
                visibility: hidden;
            }
            .box.tv-inside,
            .box.box-inside {
                border-color: var(--focus-green);
                box-shadow: 0 0 18px var(--focus-green-glow);
            }
        }

        /* Ã˜ÂªÃ™â€žÃ™ÂÃ˜Â§Ã˜Â² / Ã˜Â´Ã˜Â§Ã˜Â´Ã˜Â§Ã˜Âª Ã˜Â¹Ã˜Â±Ã™Å Ã˜Â¶Ã˜Â© */
        @media (min-width: 1024px) and (min-height: 540px) {
            :root {
                --card-cols: 4;
                --card-gap: 16px;
                --box-pad-y: 14px;
                --box-pad-x: 12px;
                --card-title-size: 16px;
                --btn-size: 13px;
                --btn-pad-y: 10px;
                --section-title-size: 22px;
                --section-pad-x: 16px;
            }
        }

        @media (min-width: 1600px) and (min-height: 720px) {
            :root {
                --card-gap: 18px;
                --card-title-size: 17px;
                --btn-size: 14px;
                --section-title-size: 24px;
            }
        }

        /* Ã˜ÂªÃ˜Â§Ã˜Â¨Ã™â€žÃ˜Âª / Ã™â€¦Ã™Ë†Ã˜Â¨Ã˜Â§Ã™Å Ã™â€ž Ã˜Â£Ã™ÂÃ™â€šÃ™Å  */
        @media (max-width: 1023px) {
            :root {
                --card-cols: 2;
                --card-gap: 12px;
                --section-title-size: 18px;
            }
        }

        @media (max-width: 900px) {
            .top-bar {
                padding: max(32px, env(safe-area-inset-top, 32px)) 24px 10px;
            }

            .columns {
                flex-direction: column;
                align-items: center;
                padding: 0 16px;
            }
            .section-divider {
                width: auto;
                height: 2px;
                margin: 8px 20px;
                background: linear-gradient(90deg, transparent, rgba(0, 220, 255, 0.5), transparent);
            }
            :root {
                --section-pad-x: 0;
            }
            .section {
                width: 100%;
                max-width: 540px;
                padding-bottom: 12px;
                min-height: auto;
            }
            .section-head {
                justify-content: center;
            }

            /* Ù…ÙˆØ¨Ø§ÙŠÙ„: Ø¨ÙˆÙƒØ³ÙŠÙ† ÙÙŠ Ø§Ù„Ù…Ù†ØªØµÙ (Ø´Ø¨ÙƒØ© 2 Ø£Ø¹Ù…Ø¯Ø©) */
            .cards-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
                width: 100%;
                max-width: 520px;
                margin: 0 auto;
                overflow: visible;
                padding: 4px 0 10px;
            }
            .box {
                flex: unset;
                min-width: 0;
                width: 100%;
                max-width: none;
                scroll-snap-align: unset;
            }
            .footer {
                padding: 48px 12px max(32px, env(safe-area-inset-bottom, 32px));
            }
        }

        /* Ù…ÙˆØ¨Ø§ÙŠÙ„ */
        @media (max-width: 640px) {
            :root {
                --card-gap: 10px;
                --box-pad-y: 10px;
                --box-pad-x: 8px;
                --card-title-size: 13px;
                --btn-size: 11px;
                --btn-pad-y: 8px;
                --section-title-size: 16px;
            }
            .brand { font-size: 18px; }
            .section {
                max-width: 100%;
            }
            .cards-grid {
                max-width: 100%;
                gap: 10px;
                padding: 4px 8px 10px;
            }
        }

        @media (max-width: 420px) {
            .cards-grid {
                gap: 8px;
                padding: 4px 6px 10px;
            }
        }

        /* Ã˜Â§Ã˜Â±Ã˜ÂªÃ™ÂÃ˜Â§Ã˜Â¹ Ã™â€šÃ˜ÂµÃ™Å Ã˜Â± (Ã™â€¦Ã™Ë†Ã˜Â¨Ã˜Â§Ã™Å Ã™â€ž Ã˜Â£Ã™ÂÃ™â€šÃ™Å  / Ã˜Â´Ã˜Â§Ã˜Â´Ã˜Â§Ã˜Âª Ã™â€¦Ã™â€ Ã˜Â®Ã™ÂÃ˜Â¶Ã˜Â©) */
        @media (max-height: 520px) {
            :root {
                --card-gap: 8px;
                --box-pad-y: 8px;
                --box-pad-x: 8px;
                --btn-pad-y: 6px;
                --section-title-size: 15px;
            }
            .section-head { margin-bottom: 10px; }
            .title-wrapper { margin-bottom: 8px; padding-bottom: 6px; }
            .top-glow-down { height: 14px; }
        }

        @media (min-height: 520px) and (min-width: 901px) {
            :root {
                --card-cols: 6;
            }
        }

        /* Ã˜ÂªÃ™â€žÃ™ÂÃ˜Â§Ã˜Â² Ã˜Â¨Ã˜Â¹Ã˜Â±Ã˜Â¶ Ã™Æ’Ã˜Â¨Ã™Å Ã˜Â± Ã™Ë†Ã™â€šÃ˜Â³Ã™â€¦Ã™Å Ã™â€  Ã˜Â¬Ã™â€ Ã˜Â¨ Ã˜Â¨Ã˜Â¹Ã˜Â¶ */
        @media (min-width: 1024px) and (max-width: 1399px) and (min-height: 540px) {
            :root {
                --card-cols: 2;
            }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="top-bar">
            <h1 class="brand">ð‘«ð‘¹ð‘¨ð‘®ð‘¶ð‘µ ð‘ºð‘¯ð‘¶ð‘¾ Game Store</h1>
        </div>
        <div class="top-glow-down" aria-hidden="true"></div>
    </header>

    <div class="main-scroll">
        <div class="scroll-body">
        <div class="columns">
            <section class="section" aria-label="Emulators">
                <div class="cards-grid" id="main-grid"></div>
            </section>
        </div>

        <div class="footer">Build by DraGon Showâ„¢_2026</div>
        </div>
    </div>

<script>
(function () {
    var DRIVE_URL = 'https://drive.usercontent.google.com/u/0/uc?id=1KMvRjVoMflh2AhVqIhhh7leFL5F3diaJ&export=download';
    var TXT = {
        details: 'عرض تفصيل',
        closeDetails: 'غلق تفصيل',
        download: 'تحميل ملف',
        cancelDl: 'الغاء تحميل',
        storageInt: 'تخزين داخلي',
        storageExt: 'تخزين خارجي USB/SD',
        downloading: 'جاري التحميل...',
        done: 'مكتمل أرجع اعمل إعادة المسح √',
        fail: 'فشل التحميل أو فك الضغط!',
        noApp: 'افتح المتجر من داخل تطبيق المحاكي.',
        noUsb: 'لم يتم العثور على USB/SD.',
        noInternal: 'مسار التخزين الداخلي غير متاح.'
    };
    function emuDesc(name) {
        return 'حزمة ROMs لمحاكي ' + name + ' — تُفك في مجلد dragonroms.';
    }
    var EMULATORS = [
        { id: 'box-sega', name: 'Sega Genesis', desc: emuDesc('Sega') },
        { id: 'box-atari', name: 'Atari 2600', desc: emuDesc('Atari') },
        { id: 'box-nintendo', name: 'Nintendo NES', desc: emuDesc('Nintendo') },
        { id: 'box-snes', name: 'Super Nintendo', desc: emuDesc('SNES') },
        { id: 'box-n64', name: 'Nintendo 64', desc: emuDesc('N64') },
        { id: 'box-gb', name: 'Game Boy', desc: emuDesc('Game Boy') },
        { id: 'box-ps1', name: 'PlayStation', desc: emuDesc('PS1') },
        { id: 'box-psp', name: 'PSP', desc: emuDesc('PSP') },
        { id: 'box-dc', name: 'Dreamcast', desc: emuDesc('Dreamcast') },
        { id: 'box-mame', name: 'MAME Arcade', desc: emuDesc('MAME') },
        { id: 'box-neogeo', name: 'Neo Geo', desc: emuDesc('Neo Geo') },
        { id: 'box-pce', name: 'PC Engine', desc: emuDesc('PC Engine') }
    ];
    var navMode = 'grid';
    var activeBox = null;
    var insideBtnIdx = 0;
    var okLock = 0;

    function getBox(el) { return el.closest('.box'); }

    function isBtnVisible(btn) {
        return btn && window.getComputedStyle(btn).display !== 'none';
    }

    function getVisibleButtons(box) {
        return Array.prototype.filter.call(box.querySelectorAll('.btn-group .btn'), isBtnVisible);
    }

    function getAllBoxes() {
        return Array.prototype.slice.call(document.querySelectorAll('.box'));
    }

    function buildGrid() {
        var grid = document.getElementById('main-grid');
        if (!grid) return;
        grid.innerHTML = EMULATORS.map(function (emu) {
            return '<div class="box" id="' + emu.id + '" tabindex="-1" data-url="' + DRIVE_URL + '">' +
                '<div class="title-wrapper"><h2>' + emu.name + '</h2></div>' +
                '<div class="details-panel">' + emu.desc + '</div><div class="btn-group">' +
                '<button type="button" class="btn btn-details" tabindex="-1">' + TXT.details + '</button>' +
                '<button type="button" class="btn btn-download" tabindex="-1">' + TXT.download + '</button>' +
                '<button type="button" class="btn btn-storage internal" tabindex="-1">' + TXT.storageInt + '</button>' +
                '<button type="button" class="btn btn-storage external" tabindex="-1">' + TXT.storageExt + '</button>' +
                '<div class="progress-container"><div class="timer-text">0%</div><div class="progress-bar"></div></div>' +
                '<div class="status-msg"></div></div></div>';
        }).join('');
        grid.querySelectorAll('.btn-details').forEach(function (btn) {
            btn.addEventListener('click', function () { toggleDetails(btn); });
        });
        grid.querySelectorAll('.btn-download').forEach(function (btn) {
            btn.addEventListener('click', function () { showStorageChoice(btn); });
        });
        grid.querySelectorAll('.btn-storage.internal').forEach(function (btn) {
            btn.addEventListener('click', function () { startDownload(btn, 'internal'); });
        });
        grid.querySelectorAll('.btn-storage.external').forEach(function (btn) {
            btn.addEventListener('click', function () { startDownload(btn, 'external'); });
        });
        grid.querySelectorAll('.box').forEach(function (box) {
            box.addEventListener('focus', function () {
                if (navMode !== 'grid') return;
                getAllBoxes().forEach(function (b) {
                    if (b !== box) { b.classList.remove('box-focused', 'box-inside'); b.tabIndex = -1; }
                });
                box.classList.add('box-focused');
                box.tabIndex = 0;
                activeBox = box;
            });
        });
    }

    window.resetBox = function (box) {
        box.classList.remove('storage-visible', 'details-open', 'box-downloading', 'done', 'error');
        var bar = box.querySelector('.progress-container');
        if (bar) bar.style.display = 'none';
        var timer = box.querySelector('.timer-text');
        var fill = box.querySelector('.progress-bar');
        var status = box.querySelector('.status-msg');
        var det = box.querySelector('.btn-details');
        var dl = box.querySelector('.btn-download');
        if (timer) timer.textContent = '0%';
        if (fill) fill.style.width = '0%';
        if (status) status.textContent = '';
        if (det) det.textContent = TXT.details;
        if (dl) dl.textContent = TXT.download;
    };

    window.toggleDetails = function (btn) {
        var box = getBox(btn);
        if (box.classList.contains('details-open')) {
            box.classList.remove('details-open');
            btn.textContent = TXT.details;
        } else {
            if (box.classList.contains('storage-visible')) {
                box.classList.remove('storage-visible');
                var dl = box.querySelector('.btn-download');
                if (dl) dl.textContent = TXT.download;
            }
            box.classList.add('details-open');
            btn.textContent = TXT.closeDetails;
        }
        if (navMode === 'inside' && activeBox === box) {
            insideBtnIdx = Math.max(0, getVisibleButtons(box).indexOf(btn));
            highlightInsideButton();
        }
    };

    window.showStorageChoice = function (btn) {
        var box = getBox(btn);
        var detBtn = box.querySelector('.btn-details');
        if (box.classList.contains('storage-visible')) {
            box.classList.remove('storage-visible', 'box-downloading', 'done', 'error');
            btn.textContent = TXT.download;
            if (detBtn) detBtn.textContent = box.classList.contains('details-open') ? TXT.closeDetails : TXT.details;
            if (navMode === 'inside' && activeBox === box) {
                insideBtnIdx = Math.max(0, getVisibleButtons(box).indexOf(btn));
                highlightInsideButton();
            }
            return;
        }
        if (box.classList.contains('details-open')) {
            box.classList.remove('details-open');
            if (detBtn) detBtn.textContent = TXT.details;
        }
        box.classList.add('storage-visible');
        box.classList.remove('done', 'error');
        btn.textContent = TXT.cancelDl;
        if (navMode === 'inside' && activeBox === box) {
            insideBtnIdx = Math.max(0, getVisibleButtons(box).indexOf(btn));
            highlightInsideButton();
        }
    };

    window.startDownload = function (boxIdOrBtn, storage) {
        var box, url, boxId;
        if (typeof boxIdOrBtn === 'string') {
            boxId = boxIdOrBtn;
            box = document.getElementById(boxId);
            url = box ? box.getAttribute('data-url') : '';
        } else {
            box = getBox(boxIdOrBtn);
            boxId = box.id;
            url = box.getAttribute('data-url');
        }
        if (!box || !url || !boxId) return;
        if (typeof AndroidInterface === 'undefined') {
            alert(TXT.noApp);
            return;
        }
        var path = storage === 'internal' ? AndroidInterface.getInternalPath() : AndroidInterface.getExternalPath();
        if (!path) {
            alert(storage === 'external' ? TXT.noUsb : TXT.noInternal);
            return;
        }
        box.classList.add('box-downloading');
        box.classList.remove('storage-visible', 'done', 'error');
        var bar = box.querySelector('.progress-container');
        var status = box.querySelector('.status-msg');
        if (bar) bar.style.display = 'block';
        if (status) status.textContent = TXT.downloading;
        updateDownloadProgress(boxId, 1);
        AndroidInterface.downloadAndUnzip(url, path, boxId);
    };

    window.updateDownloadProgress = function (boxId, progress) {
        var box = document.getElementById(boxId);
        if (!box) return;
        var timer = box.querySelector('.timer-text');
        var fill = box.querySelector('.progress-bar');
        var pct = Math.max(0, Math.min(100, progress | 0));
        if (timer) timer.textContent = pct + '%';
        if (fill) fill.style.width = pct + '%';
    };

    window.onUnzipComplete = function (boxId, success) {
        var box = document.getElementById(boxId);
        if (!box) return;
        box.classList.remove('box-downloading');
        var status = box.querySelector('.status-msg');
        var det = box.querySelector('.btn-details');
        var dl = box.querySelector('.btn-download');
        if (success) {
            box.classList.add('done');
            if (status) status.textContent = TXT.done;
            if (det) det.textContent = TXT.details;
            if (dl) dl.textContent = TXT.download;
        } else {
            box.classList.add('error');
            if (status) status.textContent = TXT.fail;
        }
    };

    function focusBox(boxId) {
        var prev = document.querySelector('.box.box-focused');
        if (prev && prev.id !== boxId) {
            resetBox(prev);
            prev.classList.remove('box-focused', 'box-inside');
            prev.tabIndex = -1;
        }
        var box = document.getElementById(boxId);
        if (!box) return;
        getAllBoxes().forEach(function (b) { b.tabIndex = b.id === boxId ? 0 : -1; });
        box.classList.add('box-focused');
        box.focus({ preventScroll: true });
        activeBox = box;
    }

    function highlightInsideButton() {
        if (!activeBox) return;
        var btns = getVisibleButtons(activeBox);
        if (!btns.length) return;
        if (insideBtnIdx >= btns.length) insideBtnIdx = btns.length - 1;
        if (insideBtnIdx < 0) insideBtnIdx = 0;
        activeBox.querySelectorAll('.btn').forEach(function (b) {
            b.classList.remove('btn-nav-focus');
            b.tabIndex = -1;
        });
        btns.forEach(function (b, i) {
            b.classList.toggle('btn-nav-focus', i === insideBtnIdx);
        });
        activeBox.focus({ preventScroll: true });
    }

    function enterBox(box) {
        navMode = 'inside';
        activeBox = box;
        box.tabIndex = 0;
        box.classList.add('box-inside');
        insideBtnIdx = 0;
        highlightInsideButton();
        trapBackState();
    }

    function exitBox() {
        if (!activeBox) return;
        activeBox.querySelectorAll('.btn').forEach(function (btn) {
            btn.tabIndex = -1;
            btn.classList.remove('btn-nav-focus');
        });
        activeBox.classList.remove('box-inside');
        navMode = 'grid';
        focusBox(activeBox.id);
    }

    function trapBackState() {
        try { history.pushState({ drInside: 1 }, ''); } catch (err) {}
    }

    function moveGridSpatial(dir) {
        if (!activeBox) return;
        var cur = activeBox.getBoundingClientRect();
        var curCx = (cur.left + cur.right) / 2;
        var curCy = (cur.top + cur.bottom) / 2;
        var best = null, bestScore = Infinity;
        getAllBoxes().forEach(function (b) {
            if (b === activeBox) return;
            var r = b.getBoundingClientRect();
            var cx = (r.left + r.right) / 2;
            var cy = (r.top + r.bottom) / 2;
            var dx = cx - curCx, dy = cy - curCy;
            if (dir === 'left' && dx > -15) return;
            if (dir === 'right' && dx < 15) return;
            if (dir === 'up' && dy > -15) return;
            if (dir === 'down' && dy < 15) return;
            var score = (dir === 'left' || dir === 'right') ? Math.abs(dy) * 4 + Math.abs(dx) : Math.abs(dx) * 4 + Math.abs(dy);
            if (score < bestScore) { bestScore = score; best = b; }
        });
        if (best) focusBox(best.id);
    }

    function moveInside(dir) {
        var btns = getVisibleButtons(activeBox);
        if (!btns.length) return;
        if (dir === 'down' && insideBtnIdx < btns.length - 1) insideBtnIdx++;
        if (dir === 'up' && insideBtnIdx > 0) insideBtnIdx--;
        if (dir === 'right' && insideBtnIdx < btns.length - 1) insideBtnIdx++;
        if (dir === 'left' && insideBtnIdx > 0) insideBtnIdx--;
        highlightInsideButton();
    }

    function activateInsideButton() {
        var btns = getVisibleButtons(activeBox);
        var btn = btns[insideBtnIdx];
        if (!btn) return;
        if (btn.classList.contains('btn-details')) toggleDetails(btn);
        else if (btn.classList.contains('btn-download')) showStorageChoice(btn);
        else if (btn.classList.contains('internal')) startDownload(btn, 'internal');
        else if (btn.classList.contains('external')) startDownload(btn, 'external');
    }

    function isBackKey(code, key) {
        return code === 27 || code === 4 || code === 461 || code === 10009 || key === 'Escape' || key === 'Backspace' || key === 'GoBack';
    }

    function isOkKey(code, key) {
        return code === 13 || code === 23 || code === 66 || code === 160 || code === 79 || key === 'Enter' || key === ' ' || key === 'Select';
    }

    function consumeOk(e) {
        var now = Date.now();
        if (now - okLock < 280) return true;
        okLock = now;
        return false;
    }

    function handleOk(e) {
        if (!isOkKey(e.keyCode || e.which, e.key)) return;
        if (consumeOk(e)) {
            e.preventDefault();
            e.stopPropagation();
            return;
        }
        if (navMode === 'grid' && activeBox) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            enterBox(activeBox);
            return;
        }
        if (navMode === 'inside') {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            activateInsideButton();
        }
    }

    function handleKey(e) {
        var code = e.keyCode || e.which;
        var key = e.key;
        if (navMode === 'inside' && isBackKey(code, key)) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            exitBox();
            return;
        }
        if (isOkKey(code, key)) {
            handleOk(e);
            return;
        }
        if (navMode === 'grid') {
            if (code >= 37 && code <= 40) { e.preventDefault(); e.stopPropagation(); }
            if (key === 'ArrowUp' || code === 38) { moveGridSpatial('up'); return; }
            if (key === 'ArrowDown' || code === 40) { moveGridSpatial('down'); return; }
            if (key === 'ArrowLeft' || code === 37) { moveGridSpatial('left'); return; }
            if (key === 'ArrowRight' || code === 39) { moveGridSpatial('right'); return; }
            return;
        }
        if (navMode === 'inside') {
            if (key === 'ArrowUp' || code === 38) { e.preventDefault(); moveInside('up'); return; }
            if (key === 'ArrowDown' || code === 40) { e.preventDefault(); moveInside('down'); return; }
            if (key === 'ArrowLeft' || code === 37) { e.preventDefault(); moveInside('left'); return; }
            if (key === 'ArrowRight' || code === 39) { e.preventDefault(); moveInside('right'); return; }
        }
    }

    document.addEventListener('keydown', handleKey, true);
    document.addEventListener('keyup', function (e) {
        if (isOkKey(e.keyCode || e.which, e.key)) handleOk(e);
    }, true);

    window.addEventListener('popstate', function () {
        if (navMode === 'inside') {
            exitBox();
            trapBackState();
        }
    });

    window.addEventListener('load', function () {
        buildGrid();
        trapBackState();
        if (EMULATORS.length) focusBox(EMULATORS[0].id);
    });
})();
</script>
</body>
</html>
