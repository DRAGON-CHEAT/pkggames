
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAGON SHOW</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            height: 100vh;
            color: #fff;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: #0a1628 url("dragon_bg.png") center center / cover no-repeat fixed;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .top-header {
            flex-shrink: 0;
            position: relative;
        }

        .top-bar {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 24px 8px;
            background:
                linear-gradient(180deg,
                    rgba(0, 110, 130, 0.55) 0%,
                    rgba(0, 65, 85, 0.72) 45%,
                    rgba(8, 35, 52, 0.88) 100%);
            box-shadow:
                inset 0 1px 0 rgba(120, 240, 255, 0.35),
                inset 0 -4px 14px rgba(0, 180, 210, 0.1),
                0 2px 12px rgba(0, 0, 0, 0.35);
        }

        .top-glow-down {
            position: relative;
            height: 22px;
            pointer-events: none;
            background: linear-gradient(180deg,
                rgba(120, 248, 255, 0.45) 0%,
                rgba(0, 229, 255, 0.2) 22%,
                rgba(0, 200, 230, 0.07) 55%,
                transparent 100%);
        }

        .top-glow-down::before {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            height: 2px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(125, 244, 255, 0.4) 8%,
                #7df4ff 22%,
                #00e5ff 50%,
                #7df4ff 78%,
                rgba(125, 244, 255, 0.4) 92%,
                transparent 100%);
            box-shadow:
                0 0 8px rgba(125, 244, 255, 1),
                0 0 16px rgba(0, 229, 255, 0.75),
                0 0 28px rgba(0, 229, 255, 0.35),
                0 2px 10px rgba(0, 229, 255, 0.25);
        }

        .brand {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #fff;
        }

        .main-scroll {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .scroll-body {
            display: flex;
            flex-direction: column;
            min-height: 100%;
            box-sizing: border-box;
            padding: 4px 0 0;
        }

        .columns {
            display: flex;
            gap: 0;
            min-height: min-content;
            align-items: stretch;
            padding: 0 16px;
        }

        .section {
            flex: 1;
            min-width: 0;
            padding: 12px var(--section-pad-x) 20px;
        }

        .section-divider {
            display: none;
        }

        .section-head {
            display: none;
        }

        .section-title {
            display: inline-block;
            margin: 0;
            padding: 4px 42px 6px;
            text-align: center;
            font-family: "Orbitron", "Arial Black", sans-serif;
            font-size: var(--section-title-size);
            font-weight: 800;
            color: #fff;
            letter-spacing: 1.5px;
            text-transform: none;
            line-height: 1.2;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.45);
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(0, 55, 120, 0.4) 5%,
                rgba(0, 123, 255, 0.78) 22%,
                rgba(0, 123, 255, 0.78) 78%,
                rgba(0, 55, 120, 0.4) 95%,
                transparent 100%);
        }

        :root {
            --focus-green: #3DDC84;
            --focus-green-glow: rgba(61, 220, 132, 0.5);
            --btn-cyan: #4DB8D9;
            --btn-cyan-dark: #2E9BB8;
            --btn-cyan-deep: #1A7A96;
            --card-cols: 2;
            --card-gap: 14px;
            --box-pad-y: 12px;
            --box-pad-x: 10px;
            --card-title-size: 14px;
            --btn-size: 12px;
            --btn-pad-y: 9px;
            --section-title-size: 20px;
            --section-pad-x: 14px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(var(--card-cols), minmax(0, 1fr));
            gap: var(--card-gap);
        }

        .box {
            position: relative;
            overflow: hidden;
            background-color: rgba(18, 28, 42, 0.92);
            background-image: url("https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=640&q=80");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 2px solid rgba(255, 255, 255, 0.12);
            border-radius: clamp(12px, 1.5vw, 18px);
            padding: var(--box-pad-y) var(--box-pad-x) var(--box-pad-y);
            text-align: center;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            align-self: start;
        }

        .box::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(180deg,
                rgba(6, 14, 26, 0.35) 0%,
                rgba(6, 14, 26, 0.82) 55%,
                rgba(6, 14, 26, 0.92) 100%);
            pointer-events: none;
            z-index: 0;
        }

        .box > * {
            position: relative;
            z-index: 1;
        }

        .section[aria-label="For Android"] .box {
            background-image: url("https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=640&q=80");
        }

        .section[aria-label="Emulators"] .box,
        .section[aria-label="For Android Tv"] .box {
            background-image: url("https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=640&q=80");
        }

        .box:focus,
        .box.box-focused {
            border-color: var(--focus-green);
            transform: scale(1.03);
            outline: none;
            box-shadow: 0 0 18px var(--focus-green-glow);
        }

        .box.box-inside {
            border-color: var(--focus-green);
            transform: scale(1.04);
            box-shadow:
                0 0 0 3px rgba(61, 220, 132, 0.55),
                0 0 24px var(--focus-green-glow);
        }

        .box.box-inside .title-wrapper {
            border-bottom-color: rgba(61, 220, 132, 0.45);
        }

        .box.box-inside .title-wrapper h2 {
            color: var(--focus-green);
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(0, 80, 40, 0.42) 2%,
                rgba(0, 120, 60, 0.78) 14%,
                rgba(0, 120, 60, 0.78) 86%,
                rgba(0, 80, 40, 0.42) 98%,
                transparent 100%);
        }

        .title-wrapper {
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 180, 255, 0.25);
        }

        .title-wrapper h2 {
            display: block;
            width: 100%;
            margin: 0;
            padding: 6px 8px 7px;
            font-size: var(--card-title-size);
            font-weight: 700;
            color: #4db8ff;
            line-height: 1.3;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.55);
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(0, 55, 120, 0.42) 2%,
                rgba(0, 95, 115, 0.78) 14%,
                rgba(0, 95, 115, 0.78) 86%,
                rgba(0, 55, 120, 0.42) 98%,
                transparent 100%);
        }

        .btn-group {
            padding: 0 4px;
            display: flex;
            flex-wrap: wrap;
            gap: 0 6px;
        }

        .btn {
            background: var(--btn-cyan);
            color: #fff;
            border: none;
            padding: var(--btn-pad-y) 8px;
            border-radius: 12px;
            font-size: var(--btn-size);
            cursor: pointer;
            margin: 0 0 8px;
            width: 100%;
            font-weight: 700;
            -webkit-appearance: none;
            appearance: none;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .box:not(.box-downloading):not(.done):not(.error) .btn-group .btn:last-of-type {
            margin-bottom: 0;
        }

        .btn-clean {
            background: #3a3f47;
            color: #e8e8e8;
            font-size: calc(var(--btn-size) - 1px);
            margin-bottom: 0;
        }

        .btn:focus {
            background: var(--btn-cyan-dark);
            outline: none;
            border-radius: 12px;
            box-shadow: 0 0 0 3px rgba(125, 244, 255, 0.85), 0 0 14px rgba(77, 184, 217, 0.55);
        }

        .btn:focus-visible {
            outline: none;
            border-radius: 12px;
            box-shadow: 0 0 0 3px rgba(125, 244, 255, 0.85), 0 0 14px rgba(77, 184, 217, 0.55);
        }

        .btn-clean:focus { background: #555b65; }

        .btn-storage {
            display: none;
            background: var(--btn-cyan-deep);
            color: #fff;
            width: calc(50% - 3px);
            margin-bottom: 8px;
        }

        .btn-storage.external { background: #1565C0; }

        .box.details-open:not(.storage-visible) .btn-download { display: none; }

        .box.storage-visible .btn-details { display: none; }

        .box.storage-visible .btn-storage { display: inline-block; }

        .box.storage-visible .btn-download { width: 100%; margin-bottom: 6px; }

        .box.box-downloading .btn-storage,
        .box.box-downloading .btn-details { display: none !important; }

        .box.box-downloading .btn-download { display: block !important; width: 100%; }

        .details-panel {
            display: none;
            margin: 0 4px 10px;
            padding: 8px 10px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.45);
            font-size: calc(var(--btn-size) - 1px);
            line-height: 1.5;
            text-align: right;
        }

        .box.details-open .details-panel { display: block; }

        .status-msg {
            display: none;
            margin: 0;
            padding: 0;
            font-size: 11px;
            color: #7df4ff;
            line-height: 1.4;
        }

        .box.box-downloading .status-msg {
            display: none;
        }

        .box.done .status-msg,
        .box.error .status-msg {
            display: block;
            margin-top: 6px;
        }

        .box.error .status-msg { color: #ff6b6b; }

        .btn-install.is-ready {
            background: #1a3d1a;
            color: #39ff14;
        }

        .btn-install.is-ready:focus {
            background: #245a24;
            outline: none;
            box-shadow: 0 0 0 2px #39ff14;
        }

        .btn-install.is-not-ready {
            background: #3a3f47;
            color: #aaa;
        }

        .box-ready-install .btn-cancel {
            display: none !important;
        }

        .box-ready-install .btn-dl {
            width: 100%;
        }

        .btn-cancel {
            display: none;
            background: #8b2e2e;
            color: #fff;
            width: calc(50% - 3px);
            margin-bottom: 8px;
        }

        .btn-dl { width: 100%; }

        .box-downloading .btn-dl {
            width: calc(50% - 3px);
        }

        .box-downloading .btn-cancel {
            display: inline-block;
        }

        .btn-cancel:focus { background: #a83232; }

        .progress-container {
            width: 100%;
            background: #333;
            height: 0;
            border-radius: 10px;
            margin: 0;
            display: none;
            overflow: hidden;
            position: relative;
        }

        .box.box-downloading .progress-container,
        .box.done .progress-container {
            display: block;
            height: 18px;
            margin-top: 8px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--btn-cyan-deep), var(--btn-cyan));
            transition: width 0.2s ease;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 11px;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
            z-index: 2;
        }

        .footer {
            flex-shrink: 0;
            margin-top: auto;
            text-align: center;
            padding: 40px 12px max(28px, env(safe-area-inset-bottom, 28px));
            color: #888;
            font-size: 12px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* ØªÙ„ÙØ§Ø²: Ø´Ø¨ÙƒØ© ÙƒÙ…Ø§ ÙƒØ§Ù†Øª â€” Ù„Ø§ ØªØªØ£Ø«Ø± Ø¨Ø¥Ø¹Ø¯Ø§Ø¯Ø§Øª Ø§Ù„Ù…ÙˆØ¨Ø§ÙŠÙ„ */
        @media (min-width: 901px) {
            body {
                height: 100vh;
            }
            .cards-grid {
                display: grid;
                grid-template-columns: repeat(var(--card-cols), minmax(0, 1fr));
                overflow: visible;
                flex-direction: unset;
                flex-wrap: unset;
                scroll-snap-type: none;
                padding: 0;
            }
            .box {
                flex: unset;
                min-width: 0;
                max-width: none;
                scroll-snap-align: unset;
            }
            .box:focus,
            .box:focus-within {
                transform: none;
            }
            .section-head {
                transition: opacity 0.25s ease, max-height 0.25s ease, margin-bottom 0.25s ease;
                max-height: 72px;
                overflow: hidden;
            }
            .section-head.tv-hidden {
                opacity: 0;
                max-height: 0;
                margin-bottom: 0 !important;
                visibility: hidden;
            }
            .box.tv-inside,
            .box.box-inside {
                border-color: var(--focus-green);
                box-shadow: 0 0 18px var(--focus-green-glow);
            }
        }

        /* ØªÙ„ÙØ§Ø² / Ø´Ø§Ø´Ø§Øª Ø¹Ø±ÙŠØ¶Ø© */
        @media (min-width: 1024px) and (min-height: 540px) {
            :root {
                --card-cols: 3;
                --card-gap: 16px;
                --box-pad-y: 14px;
                --box-pad-x: 12px;
                --card-title-size: 16px;
                --btn-size: 13px;
                --btn-pad-y: 10px;
                --section-title-size: 22px;
                --section-pad-x: 16px;
            }
        }

        @media (min-width: 1600px) and (min-height: 720px) {
            :root {
                --card-gap: 18px;
                --card-title-size: 17px;
                --btn-size: 14px;
                --section-title-size: 24px;
            }
        }

        /* ØªØ§Ø¨Ù„Øª / Ù…ÙˆØ¨Ø§ÙŠÙ„ Ø£ÙÙ‚ÙŠ */
        @media (max-width: 1023px) {
            :root {
                --card-cols: 2;
                --card-gap: 12px;
                --section-title-size: 18px;
            }
        }

        @media (max-width: 900px) {
            .top-bar {
                padding: max(32px, env(safe-area-inset-top, 32px)) 24px 10px;
            }

            .columns {
                flex-direction: column;
                align-items: center;
                padding: 0 16px;
            }
            .section-divider {
                width: auto;
                height: 2px;
                margin: 8px 20px;
                background: linear-gradient(90deg, transparent, rgba(0, 220, 255, 0.5), transparent);
            }
            :root {
                --section-pad-x: 0;
            }
            .section {
                width: 100%;
                max-width: 100%;
                padding-bottom: 12px;
                min-height: auto;
            }
            .section-head {
                justify-content: center;
            }

            /* موبايل: بوكسين في المنتصف (شبكة 2 أعمدة) */
            .cards-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
                width: 100%;
                max-width: 100%;
                margin: 0 auto;
                overflow: visible;
                padding: 4px 0 10px;
            }
            .box {
                flex: unset;
                min-width: 0;
                width: 100%;
                max-width: none;
                scroll-snap-align: unset;
            }
            .footer {
                padding: 48px 12px max(32px, env(safe-area-inset-bottom, 32px));
            }
        }

        /* موبايل */
        @media (max-width: 640px) {
            :root {
                --card-gap: 10px;
                --box-pad-y: 10px;
                --box-pad-x: 8px;
                --card-title-size: 13px;
                --btn-size: 11px;
                --btn-pad-y: 8px;
                --section-title-size: 16px;
            }
            .brand { font-size: 18px; }
            .section {
                max-width: 100%;
            }
            .cards-grid {
                max-width: 100%;
                gap: 10px;
                padding: 4px 8px 10px;
            }
        }

        @media (max-width: 420px) {
            .cards-grid {
                gap: 8px;
                padding: 4px 6px 10px;
            }
        }

        /* Ø§Ø±ØªÙØ§Ø¹ Ù‚ØµÙŠØ± (Ù…ÙˆØ¨Ø§ÙŠÙ„ Ø£ÙÙ‚ÙŠ / Ø´Ø§Ø´Ø§Øª Ù…Ù†Ø®ÙØ¶Ø©) */
        @media (max-height: 520px) {
            :root {
                --card-gap: 8px;
                --box-pad-y: 8px;
                --box-pad-x: 8px;
                --btn-pad-y: 6px;
                --section-title-size: 15px;
            }
            .section-head { margin-bottom: 10px; }
            .title-wrapper { margin-bottom: 8px; padding-bottom: 6px; }
            .top-glow-down { height: 14px; }
        }

        @media (max-height: 520px) and (min-width: 901px) {
            :root {
                --card-cols: 4;
            }
        }

        /* ØªÙ„ÙØ§Ø² Ø¨Ø¹Ø±Ø¶ ÙƒØ¨ÙŠØ± ÙˆÙ‚Ø³Ù…ÙŠÙ† Ø¬Ù†Ø¨ Ø¨Ø¹Ø¶ */
        @media (min-width: 1024px) and (max-width: 1399px) and (min-height: 540px) {
            :root {
                --card-cols: 2;
            }
        }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="top-bar">
            <h1 class="brand">𝑫𝑹𝑨𝑮𝑶𝑵 𝑺𝑯𝑶𝑾 Game Store</h1>
        </div>
        <div class="top-glow-down" aria-hidden="true"></div>
    </header>

    <div class="main-scroll">
        <div class="scroll-body">
        <div class="columns">
            <section class="section" aria-label="Emulators">
                <div class="cards-grid" id="cards-grid"></div>
            </section>
        </div>

        <div class="footer">Build by DraGon Show™_2026</div>
        </div>
    </div>

<script>
(function () {
    var DRIVE_URL = 'https://drive.usercontent.google.com/u/0/uc?id=1KMvRjVoMflh2AhVqIhhh7leFL5F3diaJ&export=download';
    var SUCCESS_MSG = 'مكتمل أرجع اعمل إعادة المسح √';
    var navMode = 'grid';
    var activeBox = null;

    var EMULATORS = [
        { id: 'box-sega',      name: 'Sega Genesis',   desc: 'حزمة ROMs — Sega Genesis / Mega Drive — تُفك في dragonroms.' },
        { id: 'box-atari',     name: 'Atari 2600',     desc: 'حزمة ROMs — Atari — تُفك في dragonroms.' },
        { id: 'box-nes',       name: 'Nintendo NES',   desc: 'حزمة ROMs — Nintendo NES — تُفك في dragonroms.' },
        { id: 'box-snes',      name: 'Super Nintendo', desc: 'حزمة ROMs — SNES — تُفك في dragonroms.' },
        { id: 'box-gb',        name: 'Game Boy',       desc: 'حزمة ROMs — Game Boy — تُفك في dragonroms.' },
        { id: 'box-n64',       name: 'Nintendo 64',    desc: 'حزمة ROMs — N64 — تُفك في dragonroms.' },
        { id: 'box-ps1',       name: 'PlayStation 1',  desc: 'حزمة ROMs — PS1 — تُفك في dragonroms.' },
        { id: 'box-psp',       name: 'PSP',            desc: 'حزمة ROMs — PSP — تُفك في dragonroms.' },
        { id: 'box-dreamcast', name: 'Dreamcast',      desc: 'حزمة ROMs — Dreamcast — تُفك في dragonroms.' },
        { id: 'box-mame',      name: 'MAME Arcade',    desc: 'حزمة ROMs — MAME — تُفك في dragonroms.' },
        { id: 'box-sms',       name: 'Master System',  desc: 'حزمة ROMs — Sega Master System — تُفك في dragonroms.' },
        { id: 'box-neogeo',    name: 'Neo Geo',        desc: 'حزمة ROMs — Neo Geo — تُفك في dragonroms.' }
    ];

    function getBox(el) {
        return el.closest('.box');
    }

    function bindButtonKeys(btn) {
        btn.addEventListener('keydown', function (e) {
            if (navMode !== 'inside') return;
            var code = e.keyCode || e.which;
            if (!isOkKey(code, e.key)) return;
            e.preventDefault();
            e.stopPropagation();
            activateButton(btn);
        });
    }

    function activateButton(btn) {
        if (!btn || !btn.classList.contains('btn')) return;
        if (btn.classList.contains('btn-details')) { toggleDetails(btn); return; }
        if (btn.classList.contains('btn-download')) { showStorageChoice(btn); return; }
        if (btn.classList.contains('btn-storage')) { btn.click(); }
    }

    function buildBoxes() {
        var grid = document.getElementById('cards-grid');
        if (!grid) return;
        grid.innerHTML = EMULATORS.map(function (emu) {
            return '<div class="box" id="' + emu.id + '" tabindex="-1" data-url="' + DRIVE_URL + '">' +
                '<div class="title-wrapper"><h2>' + emu.name + '</h2></div>' +
                '<div class="details-panel">' + emu.desc + '</div>' +
                '<div class="btn-group">' +
                '<button type="button" class="btn btn-details" tabindex="-1">عرض تفصيل</button>' +
                '<button type="button" class="btn btn-download" tabindex="-1">تحميل ملف</button>' +
                '<button type="button" class="btn btn-storage internal" tabindex="-1">تخزين داخلي</button>' +
                '<button type="button" class="btn btn-storage external" tabindex="-1">تخزين خارجي USB/SD</button>' +
                '<div class="progress-container"><div class="timer-text">0%</div><div class="progress-bar"></div></div>' +
                '<div class="status-msg"></div></div></div>';
        }).join('');
        grid.querySelectorAll('.box').forEach(function (box) {
            box.querySelector('.btn-details').addEventListener('click', function () { toggleDetails(this); });
            box.querySelector('.btn-download').addEventListener('click', function () { showStorageChoice(this); });
            box.querySelector('.btn-storage.internal').addEventListener('click', function () {
                startDownload(box.id, DRIVE_URL, 'internal');
            });
            box.querySelector('.btn-storage.external').addEventListener('click', function () {
                startDownload(box.id, DRIVE_URL, 'external');
            });
            box.querySelectorAll('.btn').forEach(bindButtonKeys);
            box.addEventListener('focus', onBoxFocus);
        });
    }

    window.resetBox = function (box) {
        if (!box) return;
        box.classList.remove('storage-visible', 'details-open', 'box-downloading', 'done', 'error');
        var bar = box.querySelector('.progress-container');
        var timer = box.querySelector('.timer-text');
        var fill = box.querySelector('.progress-bar');
        var status = box.querySelector('.status-msg');
        var det = box.querySelector('.btn-details');
        var dl = box.querySelector('.btn-download');
        if (bar) bar.style.display = '';
        if (timer) timer.textContent = '0%';
        if (fill) fill.style.width = '0%';
        if (status) status.textContent = '';
        if (det) { det.textContent = 'عرض تفصيل'; det.style.display = ''; }
        if (dl) { dl.textContent = 'تحميل ملف'; dl.style.display = ''; }
    };

    window.toggleDetails = function (btn) {
        var box = getBox(btn);
        var dlBtn = box.querySelector('.btn-download');
        if (box.classList.contains('details-open')) {
            box.classList.remove('details-open');
            btn.textContent = 'عرض تفصيل';
            if (!box.classList.contains('storage-visible') && dlBtn) {
                dlBtn.textContent = 'تحميل ملف';
            }
        } else {
            if (box.classList.contains('storage-visible')) {
                box.classList.remove('storage-visible');
                if (dlBtn) dlBtn.textContent = 'تحميل ملف';
            }
            box.classList.add('details-open');
            btn.textContent = 'غلق تفصيل';
        }
        if (navMode === 'inside' && activeBox === box) refreshInsideFocus(box, btn);
    };

    window.showStorageChoice = function (btn) {
        var box = getBox(btn);
        var detBtn = box.querySelector('.btn-details');
        if (box.classList.contains('box-downloading')) return;
        if (box.classList.contains('storage-visible')) {
            box.classList.remove('storage-visible', 'done', 'error');
            btn.textContent = 'تحميل ملف';
            if (detBtn) {
                detBtn.style.display = '';
                detBtn.textContent = box.classList.contains('details-open') ? 'غلق تفصيل' : 'عرض تفصيل';
            }
            if (navMode === 'inside' && activeBox === box) refreshInsideFocus(box, btn);
            return;
        }
        if (box.classList.contains('details-open')) {
            box.classList.remove('details-open');
            if (detBtn) detBtn.textContent = 'عرض تفصيل';
        }
        box.classList.add('storage-visible');
        box.classList.remove('done', 'error');
        btn.textContent = 'الغاء تحميل';
        if (navMode === 'inside' && activeBox === box) refreshInsideFocus(box, btn);
    };

    function getAllBoxes() {
        return Array.prototype.slice.call(document.querySelectorAll('#cards-grid .box'));
    }

    window.startDownload = function (boxId, url, storageType) {
        var box = document.getElementById(boxId);
        if (!box || !url) return;

        if (typeof AndroidInterface === 'undefined') {
            alert('افتح المتجر من داخل تطبيق المحاكي.');
            return;
        }

        var path = storageType === 'internal'
            ? AndroidInterface.getInternalPath()
            : AndroidInterface.getExternalPath();

        if (!path) {
            alert(storageType === 'external'
                ? 'لم يتم العثور على USB/SD. وصّل الذاكرة الخارجية أو اختر التخزين الداخلي.'
                : 'مسار التخزين الداخلي غير متاح.');
            return;
        }

        var dlBtn = box.querySelector('.btn-download');
        box.classList.add('box-downloading', 'storage-visible');
        box.classList.remove('done', 'error');
        if (dlBtn) dlBtn.textContent = 'الغاء تحميل';

        var bar = box.querySelector('.progress-container');
        var status = box.querySelector('.status-msg');
        if (bar) bar.style.display = 'block';
        if (status) status.textContent = '';
        updateDownloadProgress(boxId, 1);
        if (navMode === 'inside' && activeBox === box) refreshInsideFocus(box, dlBtn);
        AndroidInterface.downloadAndUnzip(url, path, boxId);
    };

    window.updateDownloadProgress = function (boxId, progress) {
        var box = document.getElementById(boxId);
        if (!box) return;
        var timer = box.querySelector('.timer-text');
        var fill = box.querySelector('.progress-bar');
        var pct = Math.max(0, Math.min(100, progress | 0));
        if (timer) timer.textContent = pct + '%';
        if (fill) fill.style.width = pct + '%';
    };

    window.onUnzipComplete = function (boxId, success) {
        var box = document.getElementById(boxId);
        if (!box) return;

        box.classList.remove('box-downloading');

        var status = box.querySelector('.status-msg');

        if (success) {
            box.classList.add('done');
            if (status) status.textContent = SUCCESS_MSG;
        } else {
            box.classList.add('error');
            if (status) {
                status.textContent = 'فشل التحميل أو فك الضغط! تأكد من جودة اتصال الإنترنت أو توفر مساحة كافية (أكثر من 4 جيجا).';
            }
        }
    };

    function getGridCols() {
        var grid = document.getElementById('cards-grid');
        if (!grid) return 2;
        var cols = getComputedStyle(grid).gridTemplateColumns.split(' ').filter(Boolean).length;
        return cols > 0 ? cols : 2;
    }

    function getVisibleButtons(box) {
        return Array.prototype.filter.call(
            box.querySelectorAll('.btn-group .btn'),
            function (btn) {
                return window.getComputedStyle(btn).display !== 'none';
            }
        );
    }

    function refreshInsideFocus(box, focusEl) {
        getVisibleButtons(box).forEach(function (b) { b.tabIndex = 0; });
        (focusEl || getVisibleButtons(box)[0] || box).focus();
    }

    function focusBox(boxId) {
        var prev = document.querySelector('.box.box-focused');
        if (prev && prev.id !== boxId) {
            if (!prev.classList.contains('box-downloading') && !prev.classList.contains('done')) {
                resetBox(prev);
            }
            prev.classList.remove('box-focused', 'box-inside');
            prev.tabIndex = -1;
        }
        var box = document.getElementById(boxId);
        if (!box) return;
        getAllBoxes().forEach(function (b) {
            b.tabIndex = b.id === boxId ? 0 : -1;
        });
        box.classList.add('box-focused');
        box.focus({ preventScroll: true });
        activeBox = box;
    }

    function enterBox(box) {
        navMode = 'inside';
        activeBox = box;
        box.classList.add('box-inside');
        refreshInsideFocus(box);
        setTimeout(function () {
            var btns = getVisibleButtons(box);
            if (btns[0]) btns[0].focus();
        }, 0);
    }

    function exitBox() {
        if (!activeBox) return;
        activeBox.querySelectorAll('.btn').forEach(function (btn) { btn.tabIndex = -1; });
        activeBox.classList.remove('box-inside');
        navMode = 'grid';
        focusBox(activeBox.id);
    }

    function moveGrid(dir) {
        if (!activeBox) return;
        var boxes = getAllBoxes();
        var idx = boxes.indexOf(activeBox);
        if (idx < 0) return;
        var cols = getGridCols();
        var col = idx % cols;
        var next = idx;
        if (dir === 'left' && col > 0) next = idx - 1;
        if (dir === 'right' && col < cols - 1 && idx + 1 < boxes.length) next = idx + 1;
        if (dir === 'up' && idx - cols >= 0) next = idx - cols;
        if (dir === 'down' && idx + cols < boxes.length) next = idx + cols;
        if (next !== idx) focusBox(boxes[next].id);
    }

    function moveInside(dir) {
        if (!activeBox) return;
        var btns = getVisibleButtons(activeBox);
        if (!btns.length) return;
        var idx = btns.indexOf(document.activeElement);
        if (idx < 0) { btns[0].focus(); return; }
        if (dir === 'down' && idx < btns.length - 1) btns[idx + 1].focus();
        if (dir === 'up' && idx > 0) btns[idx - 1].focus();
    }

    function activateFocusedButton() {
        activateButton(document.activeElement);
    }

    function onBoxFocus() {
        var box = this;
        if (navMode === 'grid') {
            getAllBoxes().forEach(function (b) {
                if (b !== box) {
                    b.classList.remove('box-focused', 'box-inside');
                    b.tabIndex = -1;
                }
            });
            box.classList.add('box-focused');
            box.tabIndex = 0;
            activeBox = box;
        }
    }

    function isBackKey(code) {
        return code === 27 || code === 4 || code === 461 || code === 10009;
    }

    function isOkKey(code, key) {
        return code === 13 || code === 23 || code === 66 || key === 'Enter' || key === ' ';
    }

    document.addEventListener('keydown', function (e) {
        var code = e.keyCode || e.which;
        var key = e.key;

        if (navMode === 'grid') {
            if (code >= 37 && code <= 40) { e.preventDefault(); e.stopPropagation(); }
            if (key === 'ArrowUp' || code === 38) { moveGrid('up'); return; }
            if (key === 'ArrowDown' || code === 40) { moveGrid('down'); return; }
            if (key === 'ArrowLeft' || code === 37) { moveGrid('left'); return; }
            if (key === 'ArrowRight' || code === 39) { moveGrid('right'); return; }
            if (isOkKey(code, key) && activeBox && document.activeElement === activeBox) {
                e.preventDefault();
                enterBox(activeBox);
            }
            return;
        }

        if (navMode === 'inside') {
            if (isBackKey(code)) { e.preventDefault(); exitBox(); return; }
            if (key === 'ArrowLeft' || code === 37 || key === 'ArrowRight' || code === 39) {
                e.preventDefault();
                exitBox();
                return;
            }
            if (key === 'ArrowUp' || code === 38) { e.preventDefault(); moveInside('up'); return; }
            if (key === 'ArrowDown' || code === 40) { e.preventDefault(); moveInside('down'); return; }
            if (isOkKey(code, key)) {
                e.preventDefault();
                e.stopPropagation();
                if (document.activeElement === activeBox) {
                    var firstBtn = getVisibleButtons(activeBox)[0];
                    if (firstBtn) firstBtn.focus();
                    return;
                }
                activateFocusedButton();
            }
        }
    }, true);

    window.addEventListener('load', function () {
        buildBoxes();
        if (getAllBoxes().length) focusBox(getAllBoxes()[0].id);
    });
})();
</script>
</body>
</html>
